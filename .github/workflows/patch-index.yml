          +.admission-official,
           .admission-source {
             margin: 0;
             color: var(--muted);
          @@ -405,6 +406,13 @@ input:focus {
             line-height: 1.55;
           }
           
          +.admission-official {
          +  padding: 8px 9px;
          +  border-radius: 6px;
          +  color: #36506b;
          +  background: #eef6ff;
          +}
          +
           .admission-actions {
             display: flex;
             flex-wrap: wrap;
          @@ -1200,7 +1208,7 @@ input:focus {
           
