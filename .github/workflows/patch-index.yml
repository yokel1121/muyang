name: Patch admissions page

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-index.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply admissions page patch
        run: |
          if grep -q "admission-official" index.html && grep -q "sourceLink(item)" index.html; then
            echo "index.html already patched"
            exit 0
          fi
          git apply <<'PATCH'
          diff --git a/index.html b/index.html
          index b0ac27b..9fb8a36 100644
