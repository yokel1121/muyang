                     <label class="upload-button" for="admissionFile">导入CSV</label>
                     <input id="admissionFile" type="file" accept=".csv,text/csv">
                     <button class="mini-button" id="downloadAdmissionTemplate" type="button">模板</button>
                     <button class="mini-button" id="clearAdmissionData" type="button">清空</button>
                   </div>
          +        <p class="admission-official">已接入教育部阳光高考公开页抓取脚本；公开端未统一开放的院校专业组投档线，仍需省考试院或高校官网 CSV 补齐。</p>
                   <div class="admission-source" id="admissionSourceNote"></div>
                 </div>
           
          PATCH
      - name: Commit patched page
        run: |
          if git diff --quiet index.html; then
            echo "No index.html changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Enhance admissions prediction data support"
          git push
